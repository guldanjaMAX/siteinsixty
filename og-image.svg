<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,700&amp;family=Outfit:wght@500;600;700&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#fffbf5"/>
  
  <!-- Logo -->
  <text x="40" y="52" font-family="Outfit, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a">Site in <tspan fill="#ff6d3a">Sixty</tspan></text>
  
  <!-- Problem pill -->
  <rect x="410" y="95" width="380" height="36" rx="18" fill="#fef2f2"/>
  <text x="600" y="119" font-family="Outfit, sans-serif" font-size="14" font-weight="500" fill="#dc2626" text-anchor="middle">✕  Most ideas die before they ever see daylight</text>
  
  <!-- Headline -->
  <text x="600" y="200" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="700" fill="#1a1a1a" text-anchor="middle">Test your idea.</text>
  <text x="600" y="280" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="700" font-style="italic" fill="#ff6d3a" text-anchor="middle">In under an hour.</text>
  
  <!-- Subhead -->
  <text x="600" y="340" font-family="Outfit, sans-serif" font-size="22" fill="#666666" text-anchor="middle">Get it live, test it, and know if it has legs —</text>
  <text x="600" y="370" font-family="Outfit, sans-serif" font-size="22" font-weight="600" fill="#1a1a1a" text-anchor="middle">before you spend months or thousands.</text>
  
  <!-- Stats cards -->
  <!-- Card 1 -->
  <rect x="270" y="410" width="160" height="80" rx="12" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="350" y="450" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="700" fill="#1a1a1a" text-anchor="middle">&lt;60 min</text>
  <text x="350" y="475" font-family="Outfit, sans-serif" font-size="13" fill="#666666" text-anchor="middle">Idea to live site</text>
  
  <!-- Card 2 -->
  <rect x="450" y="410" width="140" height="80" rx="12" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="520" y="450" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="700" fill="#10b981" text-anchor="middle">$0/mo</text>
  <text x="520" y="475" font-family="Outfit, sans-serif" font-size="13" fill="#666666" text-anchor="middle">Hosting cost</text>
  
  <!-- Card 3 -->
  <rect x="610" y="410" width="130" height="80" rx="12" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="675" y="450" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="700" fill="#10b981" text-anchor="middle">Zero</text>
  <text x="675" y="475" font-family="Outfit, sans-serif" font-size="13" fill="#666666" text-anchor="middle">Code required</text>
  
  <!-- CTA Button -->
  <rect x="760" y="420" width="180" height="56" rx="28" fill="#1a1a1a"/>
  <text x="850" y="456" font-family="Outfit, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">Get the Guide →</text>
  
  <!-- Price -->
  <text x="600" y="550" font-family="Outfit, sans-serif" font-size="18" fill="#666666" text-anchor="middle"><tspan font-weight="700" fill="#1a1a1a">$27</tspan> — instant access</text>
</svg>
